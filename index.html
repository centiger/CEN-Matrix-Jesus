<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>예수시대 Matrix</title>
<meta name="theme-color" content="#506FEF" />
<meta name="description" content="CEN Bible 예수시대 Matrix - 복음의 시대" />
<link rel="manifest" href="manifest.json" />
<style>
:root{
  --bg:#f6f7ff;--ink:#18213d;--muted:#6c7390;--main:#5B7FFF;--deep:#314dcc;--soft:#e8ecff;--line:#b8c4ff;--card:#ffffff;--gold:#f6c65b;
}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top,#eef2ff 0,#f8f9ff 45%,#f3f5ff 100%);color:var(--ink)}
.app{min-height:100vh;display:flex;flex-direction:column}.top{padding:18px 18px 8px;text-align:center}.badge{display:inline-flex;gap:6px;align-items:center;background:var(--soft);color:var(--deep);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;font-weight:800}.top h1{margin:10px 0 4px;font-size:27px;letter-spacing:-.04em}.top p{margin:0;color:var(--muted);font-size:14px}.timeline{margin:12px auto 4px;max-width:720px;padding:11px 14px 10px;border-radius:18px;background:#fff;border:1px solid #dde3ff;box-shadow:0 8px 22px rgba(49,77,204,.08)}.years,.timeline-icons,.events{display:grid;grid-template-columns:repeat(5,1fr);align-items:center;text-align:center;gap:4px}.years{font-size:13px;color:#3549b6;font-weight:900}.timeline-icons{font-size:18px;margin-top:4px;line-height:1}.events{font-size:11px;color:#5f6688;margin-top:4px;font-weight:800}.matrix-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 14px 18px}.matrix{position:relative;width:min(96vw,760px);height:min(72vh,620px);min-height:520px;border-radius:32px;background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(244,247,255,.94));border:1px solid #dbe2ff;box-shadow:0 22px 55px rgba(30,52,140,.16);overflow:hidden}.matrix:before{content:"";position:absolute;inset:9%;border:1px dashed rgba(91,127,255,.28);border-radius:50%;}.center{position:absolute;left:50%;top:49%;transform:translate(-50%,-50%);width:220px;min-height:220px;border-radius:50%;background:radial-gradient(circle,#ffffff 0,#eef2ff 72%,#dde6ff 100%);border:2px solid #b9c7ff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:18px;box-shadow:0 18px 35px rgba(49,77,204,.16);z-index:2}.center .era{font-size:24px;font-weight:900;letter-spacing:-.05em}.center .sub{margin-top:3px;color:var(--deep);font-weight:900}.center .msg{margin-top:10px;font-size:12.5px;line-height:1.45;color:#26325b}.center .verse{margin-top:7px;font-size:11.5px;line-height:1.45;color:#4d5580}.hub{position:absolute;width:138px;min-height:124px;border:none;border-radius:24px;background:#fff;color:var(--ink);box-shadow:0 12px 28px rgba(32,55,150,.14);border:1px solid #dbe2ff;padding:12px 9px;display:flex;flex-direction:column;align-items:center;text-align:center;cursor:pointer;transition:.18s transform,.18s box-shadow}.hub:active{transform:scale(.97)}.hub .icon{font-size:31px}.hub .name{font-weight:900;font-size:16px;margin-top:4px}.hub .desc{font-size:13px;color:#56607f;margin-top:4px;line-height:1.05;font-weight:700;letter-spacing:-.35px;white-space:nowrap}.hub .chip{margin-top:8px;background:var(--soft);color:var(--deep);font-size:10px;font-weight:800;padding:4px 8px;border-radius:999px}.h-incarnation{left:4%;top:30%}.h-ministry{left:15%;bottom:15%}.h-revelation{left:50%;top:6%;transform:translateX(-50%)}.h-cross{right:4%;top:30%}.h-resurrection{right:15%;bottom:15%}.actions{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);z-index:3;display:flex;gap:8px}.btn{border:none;border-radius:999px;background:var(--deep);color:#fff;font-weight:900;padding:11px 16px;box-shadow:0 8px 20px rgba(49,77,204,.25);cursor:pointer}.btn.secondary{background:#fff;color:var(--deep);border:1px solid #cfd8ff}.modal-back{display:none;position:fixed;inset:0;background:rgba(10,16,40,.38);z-index:20;align-items:center;justify-content:center;padding:18px}.modal{width:min(94vw,480px);background:#fff;border-radius:26px;padding:20px;box-shadow:0 25px 70px rgba(0,0,0,.25)}.modal h2{margin:0 0 12px;font-size:22px}.hub-list{display:grid;gap:10px}.hub-link{border:1px solid #dce3ff;background:#f8f9ff;border-radius:18px;padding:13px 14px;text-align:left;font-weight:900;color:var(--ink);text-decoration:none}.hub-link small{display:block;color:var(--muted);font-weight:600;margin-top:3px}.close{margin-top:14px;width:100%}@media(max-width:520px){.top h1{font-size:23px}.matrix{height:650px;min-height:650px;border-radius:24px}.matrix:before{inset:11%}.center{top:48.5%;width:168px;min-height:168px;padding:13px}.center .era{font-size:20px}.center .sub{font-size:13px}.center .msg{font-size:10.8px;line-height:1.38;margin-top:7px}.center .verse{font-size:10px;line-height:1.36;margin-top:6px}.hub{width:104px;min-height:108px;border-radius:18px;padding:9px 5px}.hub .icon{font-size:25px}.hub .name{font-size:13.5px}.hub .desc{font-size:11px;line-height:1.03;font-weight:700;letter-spacing:-.45px;white-space:nowrap}.hub .chip{font-size:9px;padding:3px 6px}.h-incarnation{left:1%;top:31%}.h-cross{right:1%;top:31%}.h-ministry{left:12%;bottom:17%}.h-resurrection{right:12%;bottom:17%}.h-revelation{top:7%}.actions{bottom:14px}.years{font-size:10.5px}.timeline-icons{font-size:15px}.events{font-size:9.5px}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <span class="badge">✝️ CEN Bible 시대별총람</span>
    <h1>예수시대 Matrix</h1>
    <p>BC 4 ~ AD 33 · 복음의 시대</p>
    <div class="timeline">
      <div class="years"><span>BC 4</span><span>AD 27</span><span>AD 29</span><span>AD 30</span><span>AD 33</span></div>
      <div class="timeline-icons"><span>👶</span><span>🌿</span><span>✨</span><span>✝️</span><span>👑</span></div>
      <div class="events"><span>탄생</span><span>사역</span><span>계시</span><span>십자가</span><span>부활</span></div>
    </div>
  </header>
  <main class="matrix-wrap">
    <section class="matrix" aria-label="예수시대 매트릭스">
      <button class="hub h-revelation" onclick="location.href='hubs/index.html?hub=revelation'">
        <span class="icon">✨</span><span class="name">메시아 계시</span><span class="desc">예수는 누구신가</span><span class="chip">입장</span>
      </button>
      <button class="hub h-incarnation" onclick="location.href='hubs/index.html?hub=incarnation'">
        <span class="icon">👶</span><span class="name">성육신 허브</span><span class="desc">말씀이 육신이 되심</span><span class="chip">입장</span>
      </button>
      <button class="hub h-cross" onclick="location.href='hubs/index.html?hub=cross'">
        <span class="icon">✝️</span><span class="name">십자가</span><span class="desc">구속 완성</span><span class="chip">허브탐험</span>
      </button>
      <button class="hub h-ministry" onclick="location.href='hubs/index.html?hub=ministry'">
        <span class="icon">🌿</span><span class="name">사역 허브</span><span class="desc">하나님 나라 선포</span><span class="chip">입장</span>
      </button>
      <button class="hub h-resurrection" onclick="location.href='hubs/index.html?hub=resurrection'">
        <span class="icon">👑</span><span class="name">부활 허브</span><span class="desc">승리와 새 창조</span><span class="chip">허브탐험</span>
      </button>
      <div class="center">
        <div class="era">예수시대</div>
        <div class="sub">복음의 시대</div>
        <div class="msg">하나님 나라가 임하고<br>구속이 성취되다</div>
        <div class="verse">“말씀이 육신이 되어<br>우리 가운데 거하시매”<br><b>(요 1:14)</b></div>
      </div>
      <div class="actions"><button class="btn" onclick="openHubList()">허브 목록</button><button class="btn secondary" onclick="location.href='hubs/index.html?hub=incarnation'">성육신 시작</button></div>
    </section>
  </main>
</div>
<div class="modal-back" id="hubModal"><div class="modal"><h2>예수시대 허브 목록</h2><div class="hub-list" id="hubList"></div><button class="btn close" onclick="closeHubList()">닫기</button></div></div>
<script>
const HUBS=[
 {id:'incarnation',icon:'👶',title:'성육신 허브',sub:'수태고지 · 예수 탄생 · 애굽 피난 · 나사렛 성장',ready:true},
 {id:'ministry',icon:'🌿',title:'사역 허브',sub:'세례 · 광야시험 · 제자 부르심 · 하나님 나라 선포',ready:true},
 {id:'revelation',icon:'✨',title:'메시아 계시 허브',sub:'오병이어 · 신앙고백 · 변화산 · 나사로 부활',ready:true},
 {id:'cross',icon:'✝️',title:'십자가 허브',sub:'예루살렘 입성 · 최후의 만찬 · 겟세마네 · 십자가',ready:true},
 {id:'resurrection',icon:'👑',title:'부활 허브',sub:'빈 무덤 · 부활 현현 · 지상명령 · 승천',ready:true}
];
function openHubList(){const box=document.getElementById('hubList');box.innerHTML=HUBS.map(h=>`<a class="hub-link" href="hubs/index.html?hub=${h.id}">${h.icon} ${h.title}${h.ready?'':' <small>준비중 화면</small>'}<small>${h.sub}</small></a>`).join('');document.getElementById('hubModal').style.display='flex'}
function closeHubList(){document.getElementById('hubModal').style.display='none'}
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));}
</script>
</body>
</html>
