<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>예수시대 허브</title>
<meta name="theme-color" content="#506FEF" />
<style>
:root{--bg:#f6f7ff;--ink:#17203d;--muted:#68708e;--main:#5B7FFF;--deep:#314dcc;--soft:#e8ecff;--line:#cfd8ff;--card:#fff;--warn:#8a6d2a}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#eef2ff,#f9faff);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}.page{max-width:840px;margin:0 auto;min-height:100vh;padding:16px}.top{position:sticky;top:0;z-index:5;background:rgba(246,247,255,.92);backdrop-filter:blur(10px);padding:8px 0 12px}.nav{display:flex;gap:8px;align-items:center}.btn{border:none;border-radius:999px;background:var(--deep);color:#fff;font-weight:900;padding:10px 14px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 18px rgba(49,77,204,.2)}.btn.ghost{background:#fff;color:var(--deep);border:1px solid var(--line)}.hero{margin-top:10px;background:#fff;border:1px solid #dbe2ff;border-radius:28px;padding:20px;box-shadow:0 18px 45px rgba(49,77,204,.12)}.kicker{font-size:13px;font-weight:900;color:var(--deep)}h1{margin:6px 0 6px;font-size:28px;letter-spacing:-.05em}.summary{color:var(--muted);line-height:1.55}.msg{margin-top:14px;background:var(--soft);border:1px solid var(--line);border-radius:20px;padding:14px;font-weight:900;line-height:1.5;color:#26325b}.grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}.card{background:#fff;border:1px solid #dfe5ff;border-radius:24px;padding:18px;box-shadow:0 10px 26px rgba(49,77,204,.08)}.card h2{margin:0 0 10px;font-size:20px}.flow{display:grid;gap:8px}.step{display:flex;gap:10px;align-items:flex-start;background:#f8f9ff;border:1px solid #e3e8ff;border-radius:16px;padding:12px}.num{flex:0 0 auto;width:28px;height:28px;border-radius:50%;background:var(--main);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900}.step b{display:block}.step span{display:block;color:var(--muted);font-size:13px;margin-top:2px}.mapbox{border-radius:22px;overflow:hidden;border:1px solid #dce3ff;background:#f2f4ff}.mapbox img{width:100%;display:block}.map-caption{padding:14px;color:#3f496e;line-height:1.6;background:#fff}.tagrow{display:flex;gap:8px;flex-wrap:wrap}.tag{background:var(--soft);color:var(--deep);font-weight:800;border-radius:999px;padding:7px 10px;font-size:13px}.bottom-nav{display:flex;gap:8px;margin:18px 0 26px}.bottom-nav .btn{flex:1}.modal-back{display:none;position:fixed;inset:0;background:rgba(10,16,40,.38);z-index:20;align-items:center;justify-content:center;padding:18px}.modal{width:min(94vw,480px);background:#fff;border-radius:26px;padding:20px;box-shadow:0 25px 70px rgba(0,0,0,.25)}.modal h2{margin:0 0 12px}.hub-list{display:grid;gap:10px}.hub-link{border:1px solid #dce3ff;background:#f8f9ff;border-radius:18px;padding:13px 14px;text-align:left;font-weight:900;color:var(--ink);text-decoration:none}.hub-link small{display:block;color:var(--muted);font-weight:600;margin-top:3px}.prep{text-align:center;padding:28px 12px}.prep .big{font-size:42px}.prep h2{font-size:26px;margin:8px 0}.prep p{color:var(--muted);line-height:1.55}@media(min-width:760px){.grid{grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}}@media(max-width:520px){.page{padding:12px}.hero{padding:17px;border-radius:24px}h1{font-size:25px}.bottom-nav{flex-direction:column}}
</style>
</head>
<body>
<div class="page"><div class="top"><div class="nav"><a class="btn ghost" href="../index.html">← Matrix</a><button class="btn" onclick="openHubList()">허브 목록</button></div></div><main id="app"></main></div>
<div class="modal-back" id="hubModal"><div class="modal"><h2>예수시대 허브 목록</h2><div class="hub-list" id="hubList"></div><button class="btn" style="width:100%;margin-top:14px" onclick="closeHubList()">닫기</button></div></div>
<script>
const hubs=[
 {id:'incarnation',icon:'👶',title:'성육신 허브',theme:'하나님이 사람이 되어 우리 가운데 오시다',ready:true,period:'BC 4 전후',message:'말씀이 육신이 되어 우리 가운데 거하시매',map:'assets/maps/incarnation-hub-map.png',mapText:'갈릴리 나사렛에서 천사 가브리엘이 마리아에게 수태고지를 전하는 장면으로 시작한다. 이후 요셉과 마리아가 베들레헴으로 이동하여 예수가 탄생하고, 들판의 목자들이 천사의 소식을 듣고 경배하는 장면을 배치한다. 동방박사들이 별을 따라 베들레헴에 도착하여 경배하는 모습과 헤롯의 박해를 피해 애굽으로 피난하는 경로를 표시한다. 마지막에는 나사렛으로 돌아와 성장하는 예수의 모습을 배치하여 성육신의 전 과정을 한눈에 볼 수 있도록 구성한다. 나사렛, 베들레헴, 예루살렘, 애굽을 주요 지점으로 표시하고 이동 경로가 자연스럽게 이어지도록 한다.',people:['예수','마리아','요셉','가브리엘','헤롯','동방박사'],steps:[['수태고지','가브리엘이 마리아에게 메시아 탄생을 알림'],['마리아의 순종','주의 여종이오니 말씀대로 이루어지이다'],['예수 탄생','베들레헴에서 다윗의 자손으로 나심'],['목자들의 경배','들판의 목자들이 천사의 소식을 듣고 경배함'],['동방박사의 경배','별을 따라온 박사들이 왕께 예물을 드림'],['애굽 피난','헤롯의 박해를 피해 애굽으로 피함'],['나사렛 성장','나사렛에서 자라며 공생애를 준비함']],connections:['창세기 3:15 → 여자의 후손','이사야 7:14 → 임마누엘','미가 5:2 → 베들레헴','호세아 11:1 → 애굽에서 불러냄','다윗 언약 → 메시아 왕'],prev:null,next:'ministry'},
 {id:'ministry',icon:'🌿',title:'사역 허브',theme:'하나님 나라를 선포하시다',ready:true,period:'AD 27 전후',message:'회개하라 천국이 가까이 왔느니라',ref:'마태복음 4:17',map:'assets/maps/ministry-hub-map.png',mapText:'요단강에서 세례 요한이 예수에게 세례를 베풀고 성령이 비둘기처럼 임하는 장면으로 시작한다. 이어 광야에서 40일 동안 금식하며 사탄의 시험을 물리치는 모습을 배치한다. 갈릴리 호숫가에서는 베드로와 안드레, 야고보와 요한을 제자로 부르는 장면을 표현한다. 갈릴리와 가버나움을 중심으로 산상수훈, 치유와 이적, 천국 비유 선포가 이어지며 하나님 나라 복음이 확장되는 흐름을 시각화한다. 요단강, 광야, 갈릴리 호수, 가버나움, 가나를 주요 지점으로 표시하고 이동 경로가 자연스럽게 연결되도록 구성한다.',people:['예수','세례 요한','베드로','안드레','야고보','요한'],steps:[['세례 요한의 준비','광야에서 회개를 선포하며 주의 길을 예비함'],['예수님의 세례','요단강에서 세례를 받으시고 성령이 임하심'],['광야 시험','40일 금식 후 사탄의 시험을 말씀으로 이기심'],['제자 부르심','갈릴리에서 베드로와 안드레, 야고보와 요한을 부르심'],['산상수훈','하나님 나라 백성의 삶과 의를 가르치심'],['치유와 이적','병든 자를 고치시고 자연과 귀신을 다스리심'],['하나님 나라 선포','회개와 천국 복음을 선포하시며 사역을 확장하심']],connections:['출애굽 40년 → 광야시험 40일','홍해 → 세례','모세 율법 → 산상수훈','엘리야 → 세례 요한','가나안 정복 → 하나님 나라 선포'],prev:'incarnation',next:'revelation'},
 {id:'revelation',icon:'✨',title:'메시아 계시 허브',theme:'예수는 그리스도시요 살아계신 하나님의 아들이시다',ready:true,period:'AD 29 전후',message:'주는 그리스도시요 살아계신 하나님의 아들이시니이다',ref:'마태복음 16:16',map:'assets/maps/revelation-hub-map.png',mapText:'갈릴리 지역에서 오병이어 기적이 일어나 수많은 무리가 먹는 장면으로 시작한다. 이어 갈릴리 호수에서 예수께서 물 위를 걸으시고 베드로가 믿음으로 나아가는 모습을 배치한다. 북쪽 가이사랴 빌립보에서는 베드로가 “주는 그리스도시요 살아계신 하나님의 아들이십니다”라고 신앙고백하는 장면을 표현한다. 이어 변화산에서 모세와 엘리야가 예수와 함께 나타나고 하늘의 음성이 들리는 장면을 배치한다. 마지막으로 베다니에서 나사로가 무덤에서 살아 나오는 장면을 통해 예수의 메시아적 권능이 절정에 이르는 흐름을 시각화한다. 갈릴리 호수, 가이사랴 빌립보, 변화산, 베다니를 주요 지점으로 표시하고 이동 경로가 자연스럽게 이어지도록 구성한다.',people:['예수','베드로','야고보','요한','모세','엘리야','나사로'],steps:[['오병이어','떡 다섯 개와 물고기 두 마리로 큰 무리를 먹이심'],['물 위를 걸으심','갈릴리 호수의 풍랑 가운데 물 위를 걸으시며 제자들에게 자신을 드러내심'],['베드로 신앙고백','가이사랴 빌립보에서 예수를 그리스도요 하나님의 아들로 고백함'],['변화산','모세와 엘리야가 나타나고 예수의 영광이 드러남'],['나사로 부활','베다니에서 죽은 나사로를 살리시며 생명의 주권을 보이심']],connections:['만나 → 오병이어','홍해 → 물 위를 걸으심','시내산 → 변화산','엘리야 → 변화산','에스겔의 마른 뼈 → 나사로 부활'],prev:'ministry',next:'cross'},
 {id:'cross',icon:'✝️',title:'십자가 허브',theme:'구속 완성',ready:false,prev:'revelation',next:'resurrection'},
 {id:'resurrection',icon:'👑',title:'부활 허브',theme:'승리와 새 창조',ready:false,prev:'cross',next:null}
];
const qs=new URLSearchParams(location.search);const id=qs.get('hub')||'incarnation';const hub=hubs.find(h=>h.id===id)||hubs[0];const app=document.getElementById('app');
function hubUrl(id){return `index.html?hub=${id}`}
function render(){if(!hub.ready){app.innerHTML=`<section class="hero prep"><div class="big">${hub.icon}</div><h1>${hub.title}</h1><p>${hub.theme}</p><div class="msg">이 허브는 다음 단계에서 제작 예정입니다.</div></section>${navHtml(hub)}`;return}
app.innerHTML=`<section class="hero"><div class="kicker">${hub.icon} 예수시대 · ${hub.period}</div><h1>${hub.title}</h1><p class="summary">${hub.theme}</p><div class="msg">“${hub.message}”<br><span style="font-size:13px;color:#68708e">${hub.ref||'요한복음 1:14'}</span></div></section><section class="grid"><article class="card wide"><h2>핵심사건 흐름</h2><div class="flow">${hub.steps.map((s,i)=>`<div class="step"><div class="num">${i+1}</div><div><b>${s[0]}</b><span>${s[1]}</span></div></div>`).join('')}</div></article><article class="card"><h2>대표 인물</h2><div class="tagrow">${hub.people.map(p=>`<span class="tag">${p}</span>`).join('')}</div></article><article class="card"><h2>연결탐험</h2><div class="flow">${hub.connections.map((c,i)=>`<div class="step"><div class="num">${i+1}</div><div><b>${c}</b></div></div>`).join('')}</div></article><article class="card wide"><h2>허브 지도</h2><div class="mapbox"><img src="${hub.map}" alt="${hub.title} 지도"><div class="map-caption">${hub.mapText}</div></div></article></section>${navHtml(hub)}`}
function navHtml(h){let prev=h.prev?hubs.find(x=>x.id===h.prev):null;let next=h.next?hubs.find(x=>x.id===h.next):null;return `<div class="bottom-nav">${prev?`<a class="btn ghost" href="${hubUrl(prev.id)}">← 이전 허브: ${prev.title}</a>`:`<a class="btn ghost" href="../index.html">← Matrix로</a>`}${next?`<a class="btn" href="${hubUrl(next.id)}">다음 허브: ${next.title} →</a>`:`<a class="btn" href="../index.html">Matrix로 돌아가기</a>`}</div>`}
function openHubList(){document.getElementById('hubList').innerHTML=hubs.map(h=>`<a class="hub-link" href="${hubUrl(h.id)}">${h.icon} ${h.title}${h.ready?'':' <small>준비중 화면</small>'}<small>${h.theme}</small></a>`).join('');document.getElementById('hubModal').style.display='flex'}
function closeHubList(){document.getElementById('hubModal').style.display='none'}
render();
</script>
</body>
</html>
